  <!-- globaler Print-/Grain-/Versatz-Filter -->
  <svg id="global-print-filter-svg" aria-hidden="true">
    <defs>
      <filter id="printOffsetFilter" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.9"
          numOctaves="0.5"
          seed="7"
          result="dispNoise"
        />
        <feDisplacementMap
          in="SourceGraphic"
          in2="dispNoise"
          scale="0.7"
          xChannelSelector="R"
          yChannelSelector="G"
          result="displacedGraphic"
        />
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.8"
          numOctaves="3"
          seed="11"
          stitchTiles="stitch"
          result="grainNoise"
        />
        <feColorMatrix
          in="grainNoise"
          type="matrix"
          values="1.4 0 0 0 -0.2  0 1.4 0 0 -0.2  0 0 1.4 0 -0.2  0 0 0 1 0"
          result="grainContrast"
        />
        <feComposite
          in="grainContrast"
          in2="SourceAlpha"
          operator="in"
          result="grainInsideShape"
        />
        <feComponentTransfer in="grainInsideShape" result="grainSoft">
          <feFuncA type="linear" slope="0.78" />
        </feComponentTransfer>
        <feBlend in="displacedGraphic" in2="grainSoft" mode="multiply" />
      </filter>
    </defs>
  </svg>
