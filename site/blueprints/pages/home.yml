fieldsets:
  buch:
    label: Buch-Vorstellung
    icon: book
    fields:
      title:
        label: Große Überschrift
        type: text
        placeholder: "z.B. Energie Verstehen"
      text:
        label: Einleitungstext
        type: textarea
        size: medium
      cover:
        label: Buch-Cover (PNG/JPG)
        type: files
        max: 1
        layout: cards
      button_text:
        label: Button Text
        type: text
        default: "Jetzt bestellen"
      button_link:
        label: Button Ziel (URL)
        type: text